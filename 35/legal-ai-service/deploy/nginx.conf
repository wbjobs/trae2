upstream legal_ai_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name legal-ai.example.com;

    client_max_body_size 50M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    access_log /var/log/nginx/legal-ai.access.log;
    error_log /var/log/nginx/legal-ai.error.log;

    location / {
        proxy_pass http://legal_ai_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        access_log off;
        proxy_pass http://legal_ai_backend/health;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
