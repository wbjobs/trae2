<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Animation Renderer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a0f;
    }
    canvas {
      display: block;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <script>
    let scene, camera, renderer;
    let geometries = new Map();
    let operations = [];
    let startTime, endTime, fps;
    let animationWidth, animationHeight;

    function createGeometry(data) {
      let geometry;
      switch (data.type) {
        case 'box':
          geometry = new THREE.BoxGeometry(1, 1, 1);
          break;
        case 'sphere':
          geometry = new THREE.SphereGeometry(0.5, 32, 32);
          break;
        case 'cylinder':
          geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
          break;
        default:
          geometry = new THREE.BoxGeometry(1, 1, 1);
      }

      const material = new THREE.MeshStandardMaterial({
        color: data.color || '#00ff88',
        roughness: 0.3,
        metalness: 0.5,
        side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(geometry, material);
      
      if (data.position) {
        mesh.position.set(data.position.x, data.position.y, data.position.z);
      }
      if (data.rotation) {
        mesh.rotation.set(data.rotation.x, data.rotation.y, data.rotation.z);
      }
      if (data.scale) {
        mesh.scale.set(data.scale.x, data.scale.y, data.scale.z);
      }

      mesh.castShadow = true;
      mesh.receiveShadow = true;
      
      return mesh;
    }

    window.initRenderer = function(options) {
      const { initialState, operations: ops, startTime: st, endTime: et, fps: f, width, height } = options;
      
      operations = ops;
      startTime = st;
      endTime = et;
      fps = f;
      animationWidth = width;
      animationHeight = height;

      scene = new THREE.Scene();
      scene.background = new THREE.Color('#0a0a0f');
      scene.fog = new THREE.Fog('#0a0a0f', 10, 30);

      camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
      camera.position.set(6, 4, 6);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ 
        antialias: true,
        preserveDrawingBuffer: true,
        powerPreference: 'high-performance'
      });
      renderer.setSize(width, height);
      renderer.setPixelRatio(1);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 10, 5);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      directionalLight.shadow.camera.near = 0.5;
      directionalLight.shadow.camera.far = 50;
      directionalLight.shadow.camera.left = -10;
      directionalLight.shadow.camera.right = 10;
      directionalLight.shadow.camera.top = 10;
      directionalLight.shadow.camera.bottom = -10;
      scene.add(directionalLight);

      const fillLight = new THREE.DirectionalLight(0x00d4ff, 0.3);
      fillLight.position.set(-5, 5, -5);
      scene.add(fillLight);

      const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
      gridHelper.position.y = -0.01;
      scene.add(gridHelper);

      const planeGeometry = new THREE.PlaneGeometry(30, 30);
      const planeMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a2e,
        roughness: 0.9,
        metalness: 0.1
      });
      const plane = new THREE.Mesh(planeGeometry, planeMaterial);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.01;
      plane.receiveShadow = true;
      scene.add(plane);

      initialState.forEach(geometryData => {
        const mesh = createGeometry(geometryData);
        geometries.set(geometryData.id, mesh);
        scene.add(mesh);
      });

      renderer.render(scene, camera);

      return { success: true, geometryCount: geometries.size };
    };

    window.renderFrame = function(targetTime) {
      for (const op of operations) {
        if (op.timestamp > targetTime) break;

        const { type, geometryId, data } = op;

        switch (type) {
          case 'ADD':
            if (!geometries.has(geometryId)) {
              const mesh = createGeometry({ ...data, id: geometryId });
              geometries.set(geometryId, mesh);
              scene.add(mesh);
            }
            break;

          case 'UPDATE':
            if (geometries.has(geometryId)) {
              const mesh = geometries.get(geometryId);
              if (data.position) {
                mesh.position.set(data.position.x, data.position.y, data.position.z);
              }
              if (data.rotation) {
                mesh.rotation.set(data.rotation.x, data.rotation.y, data.rotation.z);
              }
              if (data.scale) {
                mesh.scale.set(data.scale.x, data.scale.y, data.scale.z);
              }
              if (data.color) {
                mesh.material.color.set(data.color);
              }
            }
            break;

          case 'DELETE':
            if (geometries.has(geometryId)) {
              const mesh = geometries.get(geometryId);
              scene.remove(mesh);
              mesh.geometry.dispose();
              mesh.material.dispose();
              geometries.delete(geometryId);
            }
            break;
        }
      }

      const progress = (targetTime - startTime) / (endTime - startTime);
      const cameraAngle = progress * Math.PI * 0.5;
      const cameraRadius = 8;
      camera.position.x = Math.cos(cameraAngle) * cameraRadius;
      camera.position.z = Math.sin(cameraAngle) * cameraRadius;
      camera.position.y = 4 + Math.sin(progress * Math.PI) * 2;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);

      return renderer.domElement.toDataURL('image/png', 0.9);
    };
  </script>
</body>
</html>
