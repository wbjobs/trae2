<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合管廊通风消防管线三维布局与碰撞检测平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app-container">
        <div id="top-bar">
            <div class="app-logo">
                <div class="logo-icon">管</div>
                <span>综合管廊三维碰撞检测平台</span>
            </div>
            <div class="toolbar">
                <button class="btn-tool" id="btn-home" title="重置视角">
                    <span class="icon">🏠</span> 重置
                </button>
                <div class="toolbar-divider"></div>
                <button class="btn-tool" id="btn-collision" title="碰撞检测">
                    <span class="icon">⚡</span> 碰撞检测
                </button>
                <button class="btn-tool" id="btn-section" title="三维剖切">
                    <span class="icon">✂️</span> 剖切分析
                </button>
                <button class="btn-tool" id="btn-measure" title="尺寸标注">
                    <span class="icon">📏</span> 尺寸测量
                </button>
                <div class="toolbar-divider"></div>
                <button class="btn-tool" id="btn-query" title="数据查询">
                    <span class="icon">🔍</span> 数据查询
                </button>
                <button class="btn-tool" id="btn-filter" title="管线过滤">
                    <span class="icon">🎛️</span> 过滤
                </button>
                <button class="btn-tool" id="btn-opacity" title="透明度调节">
                    <span class="icon">🔍</span> 透明度
                </button>
                <button class="btn-tool" id="btn-perf" title="性能监控">
                    <span class="icon">📊</span> 性能
                </button>
                <button class="btn-tool" id="btn-clear-anno" title="清除标注">
                    <span class="icon">🧹</span> 清除标注
                </button>
            </div>
        </div>

        <div id="main-content">
            <div id="stats-panel"></div>
            <div id="viewer-container">
                <div id="sidebar">
                    <div class="sidebar-header">
                        <span class="sidebar-title">面板</span>
                        <button class="sidebar-close" onclick="app.closeSidebar()">✕</button>
                    </div>
                    <div id="sidebar-content"></div>
                </div>
            </div>
        </div>

        <div id="bottom-bar">
            <span class="status-text">就绪 - 点击管线查看详情</span>
            <span class="coords-info"></span>
        </div>
    </div>

    <div id="detail-modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/js/PipelineDataStore.js"></script>
    <script src="/js/PipelineModeler.js"></script>
    <script src="/js/CollisionDetector.js"></script>
    <script src="/js/SectionAnalyzer.js"></script>
    <script src="/js/DimensionAnnotator.js"></script>
    <script src="/js/DataQuery.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
