server:
  port: 8080

spring:
  application:
    name: mine-terrain-3d
  datasource:
    url: jdbc:postgresql://localhost:5432/mine_terrain
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

cors:
  allowed-origins: http://localhost:8081,http://localhost:3000

logging:
  level:
    com.mine.terrain: DEBUG
    org.hibernate.SQL: DEBUG
