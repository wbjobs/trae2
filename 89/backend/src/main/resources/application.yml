server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: gis3d-mapping

  mvc:
    throw-exception-if-no-handler-found: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/gis3d_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPGDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

gis:
  coordinate:
    default-srid: 4326
    web-mercator-srid: 3857

logging:
  level:
    com.gis3d: debug
    org.hibernate.SQL: debug
    org.springframework.web: debug
