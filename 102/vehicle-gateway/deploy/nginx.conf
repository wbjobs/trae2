worker_processes auto;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream gateway_http {
        least_conn;
        server gateway-node1:8080 max_fails=3 fail_timeout=30s;
        server gateway-node2:8080 max_fails=3 fail_timeout=30s;
        server gateway-node3:8080 max_fails=3 fail_timeout=30s;
        server gateway-node4:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/ {
            proxy_pass http://gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}

stream {
    upstream gateway_tcp {
        least_conn;
        server gateway-node1:8081 max_fails=3 fail_timeout=30s;
        server gateway-node2:8081 max_fails=3 fail_timeout=30s;
        server gateway-node3:8081 max_fails=3 fail_timeout=30s;
        server gateway-node4:8081 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 8081;
        proxy_pass gateway_tcp;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
