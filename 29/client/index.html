<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟沙盘 - 地形侵蚀演化模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #1a1a2e;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 320px;
      max-height: calc(100vh - 40px);
      background: rgba(26, 26, 46, 0.95);
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #ui-panel::-webkit-scrollbar {
      width: 6px;
    }

    #ui-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #ui-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #4ECDC4;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #45B7D1;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title::after {
      content: '▼';
      font-size: 10px;
      transition: transform 0.2s;
    }

    .section.collapsed .section-title::after {
      transform: rotate(-90deg);
    }

    .section-content {
      display: block;
    }

    .section.collapsed .section-content {
      display: none;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.7);
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #4ECDC4;
    }

    .form-slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
    }

    .form-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #4ECDC4;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .form-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-value {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      font-size: 12px;
      color: #4ECDC4;
    }

    .btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #4ECDC4, #45B7D1);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    .btn-danger {
      background: linear-gradient(135deg, #FF6B6B, #ee5a5a);
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 11px;
      width: auto;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .preset-btn {
      padding: 8px;
      font-size: 11px;
    }

    .status-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.9);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status-dot.connected {
      background: #4ECDC4;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: #FF6B6B;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .players-list {
      max-height: 100px;
      overflow-y: auto;
    }

    .player-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .player-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .save-list {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .save-item {
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .save-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .chat-container {
      position: absolute;
      bottom: 20px;
      left: 250px;
      width: 300px;
      background: rgba(26, 26, 46, 0.9);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }

    .chat-messages {
      height: 150px;
      overflow-y: auto;
      padding: 10px;
    }

    .chat-message {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .chat-sender {
      font-weight: bold;
      color: #4ECDC4;
    }

    .chat-input-container {
      display: flex;
      padding: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-input {
      flex: 1;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s;
      border-radius: 22px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #4ECDC4;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .connection-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 46, 0.98);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      min-width: 320px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      color: #4ECDC4;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 999;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="connection-overlay" class="modal-overlay"></div>
    <div id="connection-modal" class="connection-modal">
      <div class="modal-title">🌍 虚拟沙盘</div>
      <div class="form-group">
        <label class="form-label">服务器地址</label>
        <input type="text" id="server-address" class="form-input" value="http://localhost:8081" placeholder="http://localhost:8081">
      </div>
      <div class="form-group">
        <label class="form-label">玩家名称</label>
        <input type="text" id="player-name" class="form-input" value="探索者" placeholder="输入你的名字">
      </div>
      <button id="connect-btn" class="btn">连接服务器</button>
      <div id="connection-status" style="text-align: center; margin-top: 15px; font-size: 12px; color: #FF6B6B;"></div>
    </div>

    <div id="ui-panel" class="hidden">
      <div class="panel-title">⚙️ 控制面板</div>

      <div class="section">
        <div class="section-title" data-section="simulation">模拟控制</div>
        <div class="section-content">
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">运行模拟</span>
            <label class="toggle-switch">
              <input type="checkbox" id="simulation-toggle" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">时间倍速</span>
              <span class="slider-value" id="speed-value">1.0x</span>
            </div>
            <input type="range" class="form-slider" id="simulation-speed" min="0.1" max="5" step="0.1" value="1">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="water">水流侵蚀</div>
        <div class="section-content">
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">启用水流侵蚀</span>
            <label class="toggle-switch">
              <input type="checkbox" id="water-enabled" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">降雨速率</span>
              <span class="slider-value" id="rain-value">0.3</span>
            </div>
            <input type="range" class="form-slider" id="rain-rate" min="0" max="2" step="0.1" value="0.3">
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">侵蚀强度</span>
              <span class="slider-value" id="water-erosion-value">0.3</span>
            </div>
            <input type="range" class="form-slider" id="water-erosion" min="0" max="1" step="0.05" value="0.3">
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">沉积速率</span>
              <span class="slider-value" id="deposition-value">0.3</span>
            </div>
            <input type="range" class="form-slider" id="deposition-rate" min="0" max="1" step="0.05" value="0.3">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="wind">风力侵蚀</div>
        <div class="section-content">
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">启用风力侵蚀</span>
            <label class="toggle-switch">
              <input type="checkbox" id="wind-enabled" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">风力强度</span>
              <span class="slider-value" id="wind-strength-value">0.5</span>
            </div>
            <input type="range" class="form-slider" id="wind-strength" min="0" max="3" step="0.1" value="0.5">
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">风向角度</span>
              <span class="slider-value" id="wind-direction-value">0°</span>
            </div>
            <input type="range" class="form-slider" id="wind-direction" min="0" max="360" step="10" value="0">
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">磨蚀速率</span>
              <span class="slider-value" id="abrasion-value">0.1</span>
            </div>
            <input type="range" class="form-slider" id="abrasion-rate" min="0" max="0.5" step="0.05" value="0.1">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="presets">预设场景</div>
        <div class="section-content">
          <div class="preset-grid">
            <button class="btn btn-secondary preset-btn" data-preset="default">默认</button>
            <button class="btn btn-secondary preset-btn" data-preset="desert">沙漠</button>
            <button class="btn btn-secondary preset-btn" data-preset="riverDelta">三角洲</button>
            <button class="btn btn-secondary preset-btn" data-preset="mountain">山地</button>
            <button class="btn btn-secondary preset-btn" data-preset="coastal">海岸</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="terrain">地形生成</div>
        <div class="section-content">
          <div class="form-group">
            <div class="row">
              <span class="form-label">地形尺寸</span>
              <span class="slider-value" id="terrain-size-value">128</span>
            </div>
            <input type="range" class="form-slider" id="terrain-size" min="64" max="256" step="32" value="128">
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">高度倍率</span>
              <span class="slider-value" id="height-multiplier-value">50</span>
            </div>
            <input type="range" class="form-slider" id="height-multiplier" min="10" max="150" step="5" value="50">
          </div>
          <div class="form-group">
            <label class="form-label">随机种子</label>
            <input type="number" class="form-input" id="terrain-seed" value="12345">
          </div>
          <button id="regenerate-terrain" class="btn btn-secondary">🔄 重新生成地形</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="saves">存档管理</div>
        <div class="section-content">
          <div class="form-group">
            <label class="form-label">存档名称</label>
            <input type="text" class="form-input" id="save-name" placeholder="输入存档名称">
          </div>
          <button id="save-game" class="btn">💾 保存游戏</button>
          <button id="refresh-saves" class="btn btn-secondary btn-small" style="width: 100%;">刷新列表</button>
          <div id="save-list" class="save-list"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="snapshots">地形快照</div>
        <div class="section-content">
          <div class="form-group">
            <label class="form-label">快照名称</label>
            <input type="text" class="form-input" id="snapshot-name" placeholder="输入快照名称">
          </div>
          <div class="form-group">
            <label class="form-label">描述（可选）</label>
            <input type="text" class="form-input" id="snapshot-desc" placeholder="快照描述">
          </div>
          <button id="create-snapshot" class="btn">📸 创建快照</button>
          <button id="refresh-snapshots" class="btn btn-secondary btn-small" style="width: 100%;">刷新列表</button>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">自动快照</span>
            <label class="toggle-switch">
              <input type="checkbox" id="toggle-auto-snapshot">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">自动间隔(秒)</span>
              <span class="slider-value" id="auto-interval-value">60</span>
            </div>
            <input type="range" class="form-slider" id="auto-snapshot-interval" min="10" max="300" step="10" value="60" disabled>
          </div>
          <div id="snapshot-list" class="save-list"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="disasters">自然灾害</div>
        <div class="section-content">
          <div class="form-group">
            <label class="form-label">触发灾害</label>
            <div class="preset-grid">
              <button class="btn btn-secondary preset-btn disaster-btn" data-disaster="earthquake">🌋 地震</button>
              <button class="btn btn-secondary preset-btn disaster-btn" data-disaster="flood">🌊 洪水</button>
              <button class="btn btn-secondary preset-btn disaster-btn" data-disaster="volcano">🔥 火山</button>
              <button class="btn btn-secondary preset-btn disaster-btn" data-disaster="meteor">☄️ 陨石</button>
            </div>
          </div>
          <div class="form-group">
            <div class="row">
              <span class="form-label">灾害强度</span>
              <span class="slider-value" id="disaster-intensity-value">0.5</span>
            </div>
            <input type="range" class="form-slider" id="disaster-intensity" min="0.1" max="2" step="0.1" value="0.5">
          </div>
          <button id="stop-disaster" class="btn btn-danger" disabled>⏹️ 停止灾害</button>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">随机灾害</span>
            <label class="toggle-switch">
              <input type="checkbox" id="disasters-enabled">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group" id="disaster-status" style="text-align: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 12px;">
            <span style="color: #4ECDC4;">✓ 无灾害</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="performance">性能设置</div>
        <div class="section-content">
          <div class="form-group">
            <label class="form-label">渲染质量</label>
            <select class="form-input" id="render-quality">
              <option value="low">低质量 (高性能)</option>
              <option value="medium" selected>中等 (平衡)</option>
              <option value="high">高质量 (高品质)</option>
            </select>
          </div>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">位置插值</span>
            <label class="toggle-switch">
              <input type="checkbox" id="position-interpolation" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">启用阴影</span>
            <label class="toggle-switch">
              <input type="checkbox" id="shadows-enabled" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">水面动画</span>
            <label class="toggle-switch">
              <input type="checkbox" id="water-animation" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-group row">
            <span class="form-label" style="margin-bottom: 0;">网络延迟</span>
            <span id="latency-display" style="color: #4ECDC4; font-weight: bold;">--</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" data-section="players">在线玩家</div>
        <div class="section-content">
          <div id="players-list" class="players-list"></div>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-item">
        <div class="status-dot disconnected" id="connection-dot"></div>
        <span id="connection-text">未连接</span>
      </div>
      <div class="status-item">
        <span style="margin-right: 8px;">📍 FPS:</span>
        <span id="fps-counter">60</span>
      </div>
      <div class="status-item">
        <span style="margin-right: 8px;">🏔️ 顶点数:</span>
        <span id="vertex-count">0</span>
      </div>
    </div>

    <div class="chat-container" id="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-container">
        <input type="text" class="chat-input" id="chat-input" placeholder="发送消息...">
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
