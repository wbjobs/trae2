<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机电管线综合排布3D可视化平台</title>
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 8L16 2L28 8V24L16 30L4 24V8Z" stroke="currentColor" stroke-width="2"/>
          <path d="M16 2V18" stroke="currentColor" stroke-width="2"/>
          <path d="M4 8L16 14L28 8" stroke="currentColor" stroke-width="2"/>
          <path d="M16 18L4 24" stroke="currentColor" stroke-width="2"/>
          <path d="M16 18L28 24" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>MEP Vision 3D</span>
      </div>
      <div class="project-info">
        <span class="project-name">国家会展中心（上海）</span>
        <span class="project-stage">机电管线综合排布</span>
      </div>
      <div class="header-actions">
        <button id="btn-export" class="btn-secondary">导出报告</button>
        <button id="btn-refresh" class="btn-primary">刷新数据</button>
      </div>
    </div>

    <div class="main-container">
      <div class="sidebar left-sidebar">
        <div class="sidebar-header">
          <h3>图层管理</h3>
        </div>
        <div class="sidebar-content" id="layer-panel">
          <div class="layer-group">
            <div class="layer-group-title">
              <span>建筑结构</span>
              <span class="group-count">128</span>
            </div>
            <div class="layer-list" id="structure-layers"></div>
          </div>
          <div class="layer-group">
            <div class="layer-group-title">
              <span>暖通系统</span>
              <span class="group-count">356</span>
            </div>
            <div class="layer-list" id="hvac-layers"></div>
          </div>
          <div class="layer-group">
            <div class="layer-group-title">
              <span>给排水系统</span>
              <span class="group-count">243</span>
            </div>
            <div class="layer-list" id="plumbing-layers"></div>
          </div>
          <div class="layer-group">
            <div class="layer-group-title">
              <span>电气系统</span>
              <span class="group-count">412</span>
            </div>
            <div class="layer-list" id="electrical-layers"></div>
          </div>
          <div class="layer-group">
            <div class="layer-group-title">
              <span>消防系统</span>
              <span class="group-count">187</span>
            </div>
            <div class="layer-list" id="fire-layers"></div>
          </div>
        </div>
      </div>

      <div class="viewport-container">
        <div id="three-viewport"></div>
        
        <div class="viewport-toolbar top-toolbar">
          <div class="toolbar-group">
            <button class="tool-btn active" data-tool="orbit" title="漫游模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
            </button>
            <button class="tool-btn" data-tool="pan" title="平移模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 9l-3 3 3 3"/>
                <path d="M9 5l3-3 3 3"/>
                <path d="M19 9l3 3-3 3"/>
                <path d="M9 19l3 3 3-3"/>
              </svg>
            </button>
            <button class="tool-btn" data-tool="zoom" title="缩放模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
                <path d="M11 8v6M8 11h6"/>
              </svg>
            </button>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <button class="tool-btn" id="btn-fit" title="适配视图">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
                <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
                <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
              </svg>
            </button>
            <button class="tool-btn" id="btn-top" title="俯视图">顶</button>
            <button class="tool-btn" id="btn-front" title="正视图">正</button>
            <button class="tool-btn" id="btn-side" title="侧视图">侧</button>
            <button class="tool-btn" id="btn-iso" title="轴测图">轴</button>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <button class="tool-btn" id="btn-wireframe" title="线框模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>
            <button class="tool-btn" id="btn-xray" title="透视模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="viewport-toolbar bottom-toolbar">
          <div class="status-info">
            <span class="status-item">
              <span class="label">FPS:</span>
              <span class="value" id="fps-value">60</span>
            </span>
            <span class="status-item">
              <span class="label">构件数:</span>
              <span class="value" id="component-count">0</span>
            </span>
            <span class="status-item">
              <span class="label">碰撞点:</span>
              <span class="value collision" id="collision-count">0</span>
            </span>
          </div>
          <div class="view-info">
            <span id="view-position">X: 0.00 Y: 0.00 Z: 0.00</span>
          </div>
        </div>
      </div>

      <div class="sidebar right-sidebar">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="info">构件信息</button>
          <button class="tab-btn" data-tab="selection">批量选择</button>
          <button class="tab-btn" data-tab="animation">施工模拟</button>
          <button class="tab-btn" data-tab="collision">碰撞检测</button>
          <button class="tab-btn" data-tab="section">剖面分析</button>
        </div>
        
        <div class="sidebar-content">
          <div class="tab-content active" id="tab-info">
            <div class="info-empty" id="info-empty">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M32 8L8 22v20l24 14 24-14V22L32 8z"/>
                <path d="M32 8v40"/>
                <path d="M8 22l24 14 24-14"/>
              </svg>
              <p>点击场景中的构件查看详细信息</p>
            </div>
            <div class="info-panel" id="info-panel" style="display: none;">
              <div class="info-header">
                <div class="info-icon" id="info-icon"></div>
                <div>
                  <h4 id="info-name">构件名称</h4>
                  <span class="info-id" id="info-id">ID: --</span>
                </div>
              </div>
              <div class="info-section">
                <h5>基本属性</h5>
                <div class="info-grid" id="info-basic"></div>
              </div>
              <div class="info-section">
                <h5>几何参数</h5>
                <div class="info-grid" id="info-geometry"></div>
              </div>
              <div class="info-section">
                <h5>技术参数</h5>
                <div class="info-grid" id="info-technical"></div>
              </div>
            </div>
          </div>

          <div class="tab-content" id="tab-selection">
            <div class="selection-toolbar">
              <button class="btn-secondary" id="btn-select-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                </svg>
                框选
              </button>
              <button class="btn-secondary" id="btn-select-all">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 11l3 3L22 4"/>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                全选
              </button>
              <button class="btn-secondary" id="btn-clear-selection">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
                清除
              </button>
            </div>
            <div class="selection-stats">
              <span>已选择: <strong id="selection-count">0</strong> 个构件</span>
            </div>
            <div class="selection-actions">
              <button class="btn-secondary small" id="btn-isolate-selection">隔离显示</button>
              <button class="btn-secondary small" id="btn-hide-selection">隐藏选中</button>
              <button class="btn-secondary small" id="btn-export-selection">导出列表</button>
            </div>
            <div class="annotation-section">
              <h5>添加标注</h5>
              <textarea id="annotation-text" placeholder="输入标注内容..." rows="3"></textarea>
              <div class="annotation-controls">
                <select id="annotation-color">
                  <option value="#3b82f6">蓝色</option>
                  <option value="#10b981">绿色</option>
                  <option value="#f59e0b">橙色</option>
                  <option value="#ef4444">红色</option>
                </select>
                <button class="btn-primary small" id="btn-add-annotation">添加标注</button>
              </div>
            </div>
            <div class="annotation-list" id="annotation-list">
              <div class="annotation-empty">暂无标注</div>
            </div>
          </div>

          <div class="tab-content" id="tab-animation">
            <div class="animation-controls">
              <div class="animation-buttons">
                <button class="anim-btn" id="btn-anim-prev">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="19 20 9 12 19 4 19 20"/>
                    <line x1="5" y1="19" x2="5" y2="5"/>
                  </svg>
                </button>
                <button class="anim-btn primary" id="btn-anim-play">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                </button>
                <button class="anim-btn" id="btn-anim-stop">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="12" height="16"/>
                  </svg>
                </button>
                <button class="anim-btn" id="btn-anim-next">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19"/>
                  </svg>
                </button>
              </div>
              <div class="speed-control">
                <label>播放速度</label>
                <input type="range" id="anim-speed" min="0.1" max="3" step="0.1" value="1">
                <span id="anim-speed-value">1.0x</span>
              </div>
            </div>
            <div class="timeline-container">
              <input type="range" id="anim-timeline" min="0" max="100" value="0">
              <div class="timeline-labels">
                <span>开始</span>
                <span id="anim-progress">0%</span>
                <span>完成</span>
              </div>
            </div>
            <div class="phases-container">
              <h5>施工阶段</h5>
              <div class="phase-list" id="phase-list"></div>
            </div>
            <div class="animation-stats">
              <div class="stat-item">
                <span class="label">当前阶段</span>
                <span class="value" id="current-phase">-</span>
              </div>
              <div class="stat-item">
                <span class="label">已完成</span>
                <span class="value" id="completed-count">0</span>
              </div>
              <div class="stat-item">
                <span class="label">进行中</span>
                <span class="value" id="in-progress-count">0</span>
              </div>
            </div>
          </div>

          <div class="tab-content" id="tab-collision">
            <div class="collision-controls">
              <button class="btn-primary full-width" id="btn-detect-collision">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 11l3 3L22 4"/>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                开始碰撞检测
              </button>
              <div class="collision-settings">
                <label class="setting-item">
                  <span>检测精度</span>
                  <select id="collision-precision">
                    <option value="high">高精度</option>
                    <option value="medium" selected>中精度</option>
                    <option value="low">低精度</option>
                  </select>
                </label>
                <label class="setting-item">
                  <span>碰撞容差 (mm)</span>
                  <input type="number" id="collision-tolerance" value="50" min="0" max="500">
                </label>
              </div>
            </div>
            <div class="collision-stats" id="collision-stats" style="display: none;">
              <div class="stat-card danger">
                <span class="stat-label">严重碰撞</span>
                <span class="stat-value" id="stat-hard">0</span>
              </div>
              <div class="stat-card warning">
                <span class="stat-label">轻微碰撞</span>
                <span class="stat-value" id="stat-soft">0</span>
              </div>
              <div class="stat-card info">
                <span class="stat-label">已检测对</span>
                <span class="stat-value" id="stat-total">0</span>
              </div>
            </div>
            <div class="collision-list" id="collision-list"></div>
          </div>

          <div class="tab-content" id="tab-section">
            <div class="section-controls">
              <div class="axis-buttons">
                <button class="axis-btn active" data-axis="x">X轴</button>
                <button class="axis-btn" data-axis="y">Y轴</button>
                <button class="axis-btn" data-axis="z">Z轴</button>
              </div>
              <div class="slider-control">
                <label>剖面位置</label>
                <input type="range" id="section-position" min="0" max="100" value="50">
                <span id="section-value">50%</span>
              </div>
              <div class="slider-control">
                <label>剖面厚度</label>
                <input type="range" id="section-thickness" min="1" max="50" value="10">
                <span id="thickness-value">10%</span>
              </div>
              <button class="btn-secondary full-width" id="btn-reset-section">重置剖面</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loading-overlay">
      <div class="loading-content">
        <div class="loading-spinner">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="70 200" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>正在加载3D场景</h3>
        <p id="loading-text">初始化渲染引擎...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div class="tooltip" id="tooltip"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
