fluid:
  density: 1000.0
  viscosity: 1.0e-3
  temperature: 293.15

particle:
  diameter: 2.0e-3
  density: 2650.0
  young_modulus: 7.0e10
  poisson_ratio: 0.25
  restitution_coeff: 0.85
  friction_coeff: 0.25
  count: 2000

domain:
  x_min: 0.0
  x_max: 0.5
  y_min: 0.0
  y_max: 0.5
  z_min: 0.0
  z_max: 0.5
  periodic_x: false
  periodic_y: false
  periodic_z: false

simulation:
  time_step: 5.0e-6
  total_time: 0.1
  save_interval: 50
  gravity: [0.0, -9.81, 0.0]
  solver_type: "CFD-DEM"
  coupling_method: "Eulerian-Lagrangian"
  subcycling_steps: 5

parallel:
  enable_parallel: true
  num_processes: 8
  use_mpi: true
  thread_per_process: 2
  chunk_size: 200

output:
  output_dir: "./results/distributed"
  format: "hdf5"
  save_particle_data: true
  save_fluid_data: true
  save_force_data: true
  compression: true
  compression_level: 6

backend:
  enable_backend: true
  api_url: "http://backend.example.com/api"
  api_key: "your-api-key-here"
  status_update_interval: 5
  node_id: "compute-node-01"
  distributed_mode: true
