<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocSemanticAI - 文档语义批量处理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">📄</span>
            <span>DocSemanticAI</span>
        </div>
        <div class="nav-links">
            <a href="#" data-page="dashboard" class="nav-link active">仪表盘</a>
            <a href="#" data-page="documents" class="nav-link">文档管理</a>
            <a href="#" data-page="tasks" class="nav-link">任务中心</a>
            <a href="#" data-page="search" class="nav-link">语义检索</a>
            <a href="#" data-page="export" class="nav-link">结果导出</a>
        </div>
        <div class="nav-user">
            <span id="user-info" class="user-badge">未登录</span>
            <button id="logout-btn" class="btn btn-sm btn-outline" style="display:none;">退出</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="login-page" class="page">
            <div class="card login-card">
                <h2>🔐 系统登录</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <button id="login-btn" class="btn btn-primary btn-block">登录</button>
                <p class="text-muted text-center mt-2">还没有账号？<a href="#" id="show-register">注册新账号</a></p>
            </div>
            <div id="register-card" class="card login-card" style="display:none;">
                <h2>📝 注册账号</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="至少3个字符">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="reg-email" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="至少6个字符">
                </div>
                <button id="register-btn" class="btn btn-primary btn-block">注册</button>
                <p class="text-muted text-center mt-2">已有账号？<a href="#" id="show-login">返回登录</a></p>
            </div>
        </div>

        <div id="dashboard-page" class="page" style="display:none;">
            <h2>📊 系统概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📄</div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-docs">0</div>
                        <div class="stat-label">文档总数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-processed">0</div>
                        <div class="stat-label">已处理</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-tasks">0</div>
                        <div class="stat-label">任务数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔍</div>
                    <div class="stat-info">
                        <div class="stat-value" id="stat-searches">0</div>
                        <div class="stat-label">检索次数</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="documents-page" class="page" style="display:none;">
            <div class="page-header">
                <h2>📂 文档管理</h2>
                <div class="page-actions">
                    <div class="upload-area" id="upload-area">
                        <input type="file" id="file-input" multiple accept=".pdf,.docx,.txt,.md" style="display:none;">
                        <button class="btn btn-primary" id="upload-btn">📤 批量上传文档</button>
                        <span class="text-muted">支持 PDF、DOCX、TXT、MD 格式</span>
                    </div>
                </div>
            </div>
            <div id="upload-progress" style="display:none;" class="upload-progress-bar">
                <div class="progress-fill" id="upload-progress-fill"></div>
                <span id="upload-progress-text">上传中...</span>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all-docs"></th>
                            <th>文件名</th>
                            <th>类型</th>
                            <th>大小</th>
                            <th>状态</th>
                            <th>上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="docs-table-body">
                        <tr><td colspan="7" class="text-center text-muted">暂无文档</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="batch-actions" id="batch-actions" style="display:none;">
                <span id="selected-count">0</span> 个文档已选择
                <button class="btn btn-primary btn-sm" onclick="createBatchTask('summary')">摘要提取</button>
                <button class="btn btn-primary btn-sm" onclick="createBatchTask('keywords')">关键词标注</button>
                <button class="btn btn-primary btn-sm" onclick="createBatchTask('correction')">内容纠错</button>
                <button class="btn btn-primary btn-sm" onclick="createBatchTask('classify')">分类打标</button>
                <button class="btn btn-primary btn-sm" onclick="createBatchTask('translate')">多语言翻译</button>
                <button class="btn btn-accent btn-sm" onclick="createBatchTask('full')">全部处理</button>
            </div>
        </div>

        <div id="tasks-page" class="page" style="display:none;">
            <h2>⚡ 任务中心</h2>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>任务名称</th>
                            <th>类型</th>
                            <th>状态</th>
                            <th>进度</th>
                            <th>完成/总数</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-table-body">
                        <tr><td colspan="7" class="text-center text-muted">暂无任务</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="search-page" class="page" style="display:none;">
            <h2>🔍 语义检索</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="输入搜索内容，支持语义匹配..." class="search-input">
                <select id="search-type" class="search-type-select">
                    <option value="semantic">语义搜索</option>
                    <option value="keyword">关键词搜索</option>
                    <option value="hybrid">混合搜索</option>
                </select>
                <button class="btn btn-primary" id="search-btn">🔍 搜索</button>
            </div>
            <div id="search-results" class="search-results">
                <p class="text-center text-muted">输入关键词开始搜索</p>
            </div>
        </div>

        <div id="export-page" class="page" style="display:none;">
            <h2>📥 结果导出</h2>
            <div class="card">
                <div class="form-group">
                    <label>选择文档</label>
                    <select id="export-doc-select" multiple class="multi-select"></select>
                </div>
                <div class="form-group">
                    <label>导出格式</label>
                    <select id="export-format">
                        <option value="json">JSON</option>
                        <option value="csv">CSV</option>
                        <option value="excel">Excel</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <label><input type="checkbox" id="export-content"> 包含原文内容</label>
                    <label><input type="checkbox" id="export-summary" checked> 包含摘要</label>
                    <label><input type="checkbox" id="export-keywords" checked> 包含关键词</label>
                    <label><input type="checkbox" id="export-correction" checked> 包含纠错结果</label>
                    <label><input type="checkbox" id="export-classification" checked> 包含分类标签</label>
                    <label><input type="checkbox" id="export-translation"> 包含翻译结果</label>
                </div>
                <button class="btn btn-primary" id="export-btn">📥 导出</button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <div id="doc-detail-modal" class="modal" style="display:none;">
        <div class="modal-content card">
            <div class="modal-header">
                <h3 id="modal-title">文档详情</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <div id="task-create-modal" class="modal" style="display:none;">
        <div class="modal-content card">
            <div class="modal-header">
                <h3>创建批处理任务</h3>
                <button class="modal-close" onclick="closeTaskModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="task-name-input" placeholder="请输入任务名称">
                </div>
                <div class="form-group">
                    <label>处理类型</label>
                    <span id="task-type-display"></span>
                </div>
                <div class="form-group">
                    <label>涉及文档数</label>
                    <span id="task-doc-count-display"></span>
                </div>
                <div id="translate-lang-row" class="form-group" style="display:none;">
                    <label>翻译语言设置</label>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <div>
                            <small>源语言</small>
                            <select id="source-lang-select" class="search-type-select">
                                <option value="auto">自动检测</option>
                                <option value="zh">中文</option>
                                <option value="en">英语</option>
                                <option value="ja">日语</option>
                                <option value="ko">韩语</option>
                                <option value="fr">法语</option>
                                <option value="de">德语</option>
                                <option value="es">西班牙语</option>
                                <option value="ru">俄语</option>
                            </select>
                        </div>
                        <span>→</span>
                        <div>
                            <small>目标语言</small>
                            <select id="target-lang-select" class="search-type-select">
                                <option value="en">英语</option>
                                <option value="zh">中文</option>
                                <option value="ja">日语</option>
                                <option value="ko">韩语</option>
                                <option value="fr">法语</option>
                                <option value="de">德语</option>
                                <option value="es">西班牙语</option>
                                <option value="ru">俄语</option>
                                <option value="ar">阿拉伯语</option>
                                <option value="pt">葡萄牙语</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" id="confirm-task-btn">确认创建</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
