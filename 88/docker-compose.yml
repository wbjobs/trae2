version: '3.8'

services:
  app:
    build: .
    container_name: docsemantic-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: docsemantic-celery
    command: celery -A app.task_queue.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docsemantic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: docsemantic-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  redis_data:
  es_data:
